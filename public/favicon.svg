<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm background circle -->
  <circle cx="16" cy="16" r="16" fill="#fdf6e3"/>

  <!-- Open book pages -->
  <path d="M7 10 Q16 8 16 10 L16 23 Q7 21 7 23 Z" fill="#e8a020" opacity="0.9"/>
  <path d="M25 10 Q16 8 16 10 L16 23 Q25 21 25 23 Z" fill="#c47c10" opacity="0.9"/>

  <!-- Book spine line -->
  <line x1="16" y1="10" x2="16" y2="23" stroke="#7c4f08" stroke-width="1" opacity="0.6"/>

  <!-- Sparkle star top-right -->
  <g transform="translate(22, 8)">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#f5c842" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#f5c842" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-2" y1="-2" x2="2" y2="2" stroke="#f5c842" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="2" y1="-2" x2="-2" y2="2" stroke="#f5c842" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>
